spec:
  inputs:
    runner_tag:
      default: ""
      description: "Runner tag to use. Leave empty for any GitLab-hosted runner, or select 'self-hosted'."
      options:
        - ""
        - "self-hosted"

---

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

stages:
  - validate
  - release

variables:
  DEBIAN_FRONTEND: noninteractive
  MAVEN_USER_HOME: "$CI_PROJECT_DIR/.m2"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - pom.xml
      - frontend/package-lock.json
  paths:
    - .m2/
    - .npm/
    - frontend/node_modules/


.base_maven_node:
  tags:
    - $[[ inputs.runner_tag ]]
  image: eclipse-temurin:21-jdk
  before_script:
    - apt-get update
    - apt-get install -y curl ca-certificates
    - |
      case "$(uname -m)" in
        x86_64)  NODE_ARCH=x64 ;;
        aarch64) NODE_ARCH=arm64 ;;
        *)       echo "Unsupported architecture $(uname -m)"; exit 1 ;;
      esac
    - curl -fsSL https://nodejs.org/dist/v24.14.0/node-v24.14.0-linux-${NODE_ARCH}.tar.gz -o /tmp/node.tar.gz
    - mkdir -p /opt/node
    - tar -xzf /tmp/node.tar.gz -C /opt/node --strip-components=1
    - export PATH="/opt/node/bin:$PATH"
    - chmod +x mvnw
    - java -version
    - node --version
    - npm --version

.base_validate:
  extends: .base_maven_node
  stage: validate

backend-validate:
  extends: .base_validate
  script:
    - ./mvnw --batch-mode test
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/

frontend-validate:
  extends: .base_validate
  script:
    - cd frontend
    - npm ci
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit:
        - frontend/test-results/vitest.junit.xml
    paths:
      - frontend/test-results/

publish-release-image:
  extends: .base_maven_node
  stage: release
  needs:
    - backend-validate
    - frontend-validate
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - >
      ./mvnw --batch-mode
      -DskipTests
      -Djib.to.image=$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
      -Djib.to.auth.username=$CI_REGISTRY_USER
      -Djib.to.auth.password=$CI_REGISTRY_PASSWORD
      package
      jib:build
