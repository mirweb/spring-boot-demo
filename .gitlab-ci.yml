spec:
  inputs:
    runner_tag:
      default: ""
      description: "Runner tag to use. Leave empty for any GitLab-hosted runner, or select 'self-hosted'."
      options:
        - ""
        - "self-hosted"

---

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

stages:
  - validate
  - release
  - deploy

variables:
  DEBIAN_FRONTEND: noninteractive
  MAVEN_USER_HOME: "$CI_PROJECT_DIR/.m2"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - pom.xml
      - frontend/package-lock.json
  paths:
    - .m2/
    - .npm/
    - frontend/node_modules/


.base_maven_node:
  tags:
    - $[[ inputs.runner_tag ]]
  image: eclipse-temurin:21-jdk
  before_script:
    - apt-get update
    - apt-get install -y curl ca-certificates
    - |
      case "$(uname -m)" in
        x86_64)  NODE_ARCH=x64 ;;
        aarch64) NODE_ARCH=arm64 ;;
        *)       echo "Unsupported architecture $(uname -m)"; exit 1 ;;
      esac
    - curl -fsSL https://nodejs.org/dist/v24.14.0/node-v24.14.0-linux-${NODE_ARCH}.tar.gz -o /tmp/node.tar.gz
    - mkdir -p /opt/node
    - tar -xzf /tmp/node.tar.gz -C /opt/node --strip-components=1
    - export PATH="/opt/node/bin:$PATH"
    - chmod +x mvnw
    - java -version
    - node --version
    - npm --version

.base_validate:
  extends: .base_maven_node
  stage: validate
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: manual
      allow_failure: true

backend-validate:
  extends: .base_validate
  script:
    - ./mvnw --batch-mode ${CI_COMMIT_TAG:+-Drevision=$CI_COMMIT_TAG} test
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/

frontend-validate:
  extends: .base_validate
  script:
    - cd frontend
    - npm ci
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit:
        - frontend/test-results/vitest.junit.xml
    paths:
      - frontend/test-results/

publish-release-image:
  extends: .base_maven_node
  stage: release
  needs:
    - backend-validate
    - frontend-validate
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - >
      ./mvnw --batch-mode
      -DskipTests
      -Drevision=$CI_COMMIT_TAG
      -Djib.to.image=$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
      -Djib.to.auth.username=gitlab-ci-token
      -Djib.to.auth.password=$CI_JOB_TOKEN
      package
      jib:build

deploy-orbstack:
  stage: deploy
  tags:
    - $[[ inputs.runner_tag ]]
  image: alpine/k8s:1.32.3
  needs:
    - publish-release-image
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
  environment:
    name: orbstack
    url: https://spring-boot-demo.k8s.orb.local
  before_script:
    - kubectl config use-context mirko111/spring-boot-demo:orbstack
    - kubectl create namespace spring-boot-demo --dry-run=client -o yaml | kubectl apply -f -
    - >
      kubectl create secret docker-registry gitlab-registry
      --namespace spring-boot-demo
      --docker-server=$CI_REGISTRY
      --docker-username=$CI_REGISTRY_USER
      --docker-password=$CI_REGISTRY_PASSWORD
      --dry-run=client -o yaml | kubectl apply -f -
  script:
    - >
      sed
      -e "s|__IMAGE__|$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG|g"
      -e "s|__VERSION__|$CI_COMMIT_TAG|g"
      deploy/spring-boot-demo.yaml | kubectl apply -f -
    - kubectl rollout status deployment/spring-boot-demo --namespace spring-boot-demo --timeout=120s
