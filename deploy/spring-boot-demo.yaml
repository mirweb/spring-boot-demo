apiVersion: v1
kind: Namespace
metadata:
  name: spring-boot-demo

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-demo
  namespace: spring-boot-demo
  labels:
    app: spring-boot-demo
    version: __VERSION__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot-demo
  template:
    metadata:
      labels:
        app: spring-boot-demo
        version: __VERSION__
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: spring-boot-demo
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: spring-boot-demo
  namespace: spring-boot-demo
spec:
  selector:
    app: spring-boot-demo
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-boot-demo
  namespace: spring-boot-demo
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - spring-boot-demo.k8s.orb.local
      # Wildcard TLS secret — create once per cluster, see docs/runbooks/orbstack-local.md
      secretName: wildcard-k8s-orb-local-tls
  rules:
    - host: spring-boot-demo.k8s.orb.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-boot-demo
                port:
                  number: 8080
