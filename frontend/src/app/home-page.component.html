<section class="home-grid">
  <article class="intro-card">
    <p class="section-label">Main page</p>
    <h2>Current application content stays on the default route.</h2>
    <p class="lede">
      The Angular app still talks directly to the Spring Boot backend, but now
      it lives inside a simple routed layout with dedicated page navigation.
    </p>
  </article>

  <section class="panel">
    <label class="field">
      <span>Name</span>
      <input
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        placeholder="Enter a name"
      />
    </label>

    <button type="button" (click)="loadGreeting()" [disabled]="loading()">
      {{ loading() ? 'Loading...' : 'Fetch greeting' }}
    </button>

    <div class="response-card">
      <p class="response-label">API response</p>
      <p class="response-text">{{ message() }}</p>
      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
    </div>
  </section>
</section>
