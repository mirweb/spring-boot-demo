<main class="shell">
  <section class="hero">
    <p class="eyebrow">Spring Boot + Angular</p>
    <h1>Integrated frontend inside the same repository.</h1>
    <p class="lede">
      The Angular app lives in <code>frontend/</code>, is built by Maven, and
      talks directly to the Spring Boot backend.
    </p>
  </section>

  <section class="panel">
    <label class="field">
      <span>Name</span>
      <input
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        placeholder="Enter a name"
      />
    </label>

    <button type="button" (click)="loadGreeting()" [disabled]="loading()">
      {{ loading() ? 'Loading...' : 'Fetch greeting' }}
    </button>

    <div class="response-card">
      <p class="response-label">API response</p>
      <p class="response-text">{{ message() }}</p>
      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
    </div>
  </section>

  <footer class="app-footer" aria-label="Application metadata">
    <span>{{ appName }}</span>
    <span>v{{ appVersion }}</span>
  </footer>
</main>
