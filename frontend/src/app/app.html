<main class="app-shell">
  <header class="app-banner">
    <h1>{{ appName }}</h1>
  </header>

  <nav class="app-nav" aria-label="Primary navigation">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Main page
    </a>
    <a routerLink="/feature" routerLinkActive="active">Feature page</a>
  </nav>

  <section class="app-body">
    <router-outlet />
  </section>

  <footer class="app-footer" aria-label="Application metadata">
    <span>{{ appName }}</span>
    <span>v{{ appVersion }}</span>
  </footer>
</main>
